<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

                <input type="text" id="userName" placeholder="Tnaot-café 168" required>
            </div>
            <div class="login-input">
                <label for="emaol">Email:</label>
                <input type="email" id="email" placeholder="coffee@gamil.com" required>
            </div>
            <button type="submit">Submit</button>
        </form>
    </main>

            <div id="cotact-container">

                    <ul>
                        <li class="contact-info">
                            <i class="fa-solid fa-phone"></i>
                            097 205 502
                        </li>
                        <li class="contact-info">
                            <i class="fa-brands fa-telegram"></i>
                            097 205 502
                        </li>
                        <li class="contact-info">
                            <i class="fa-solid fa-envelope"></i>
                            TnaotCafé@gmail.come
                        </li>
                    </ul>
                </div>
                <div class="info-container">
                    <ul>
                        <li class="media-info">
                            <i class="fa-brands fa-facebook"></i>

                        </li>
                        <li class="media-info">

                        </li>

                        </li>

        </section>
