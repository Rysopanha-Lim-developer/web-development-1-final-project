<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/553294db54.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="login.css">
    <title>Tnaot-Café/Login</title>
</head>
<body>
    <header>
        <div id="shop-logo-login"></div>
    </header>
    <main>
        <p>Start your journey to day</p>
        <form action="index.html">
            <div class="login-input">
                <label for="userName">Username:</label>
                <input type="text" id="userName" placeholder="Tnaot-café 168" required>
            </div>
            <div class="login-input">
                <label for="emaol">Email:</label>
                <input type="email" id="email" placeholder="coffee@gamil.com" required>
            </div>
            <button type="submit">Submit</button>
        </form>
    </main>
</body>
</html>
